name: Build and Release Binary

on:
  push:
    tags:
      - "v*"   # Triggers on any version tag

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Linux Binary
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libjpeg-dev zlib1g-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller pycryptodome argon2-cffi jpegio

      - name: Build binary with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name aegis \
            --collect-all jpegio \
            --collect-all cv2 \
            --hidden-import argon2 \
            --hidden-import Crypto \
            $(which aegis)
        shell: bash

      - name: Upload binary as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-linux-x86_64
          path: dist/aegis

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: aegis-linux-x86_64
          path: dist/

      - name: Make binary executable
        run: chmod +x dist/aegis

      - name: Create GitHub Release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "AEGIS ${{ github.ref_name }}"
          body: |
            ## AEGIS ${{ github.ref_name }}

            Forensic-grade image security, steganography, and analysis platform.

            ### Pre-built Binary

            Download the Linux binary below — **no Python required**.

            | Platform | File |
            |---|---|
            | Linux (x86_64) | `aegis` |

            **Usage:**
            ```bash
            chmod +x aegis
            ./aegis --help
            ```
          files: dist/aegis
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
